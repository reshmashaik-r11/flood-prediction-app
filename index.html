<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floods Prediction - Input</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 30px auto; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { display: block; width: 100%; background-color: #0066cc; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:hover { background-color: #0052a3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Enter Weather Parameters</h2>
        <form action="/predict" method="POST">
            <div class="form-group">
                <label for="CloudCover">Cloud Cover (%):</label>
                <input type="text" id="CloudCover" name="CloudCover" required placeholder="e.g. 50">
            </div>
            <div class="form-group">
                <label for="ANNUAL">Annual Rainfall (mm):</label>
                <input type="text" id="ANNUAL" name="ANNUAL" required placeholder="e.g. 1200">
            </div>
            <div class="form-group">
                <label for="Jan-Feb">Jan-Feb Rainfall (mm):</label>
                <input type="text" id="Jan-Feb" name="Jan-Feb" required placeholder="e.g. 150">
            </div>
            <div class="form-group">
                <label for="Mar-May">Mar-May Rainfall (mm):</label>
                <input type="text" id="Mar-May" name="Mar-May" required placeholder="e.g. 300">
            </div>
            <div class="form-group">
                <label for="Jun-Sep">Jun-Sep Rainfall (mm):</label>
                <input type="text" id="Jun-Sep" name="Jun-Sep" required placeholder="e.g. 800">
            </div>
            <button type="submit" class="btn">Submit</button>
        </form>
    </div>
</body>
</html>
